spring.application.name=ms-standings
server.port=8086

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

apisports.base-url=https://v3.football.api-sports.io
apisports.key=${APISPORTS_KEY:}
teams.service.url=${TEAMS_SERVICE_URL:http://ms-teams:8083}
auth.service.url=${AUTH_SERVICE_URL:http://ms-auth:8081}
internal.secret=${INTERNAL_SECRET:}

springdoc.api-docs.path=/api/standings/api-docs
springdoc.swagger-ui.path=/api/standings/swagger-ui.html
