spring:
  application:
    name: ms-dashboard-test

server:
  port: 0

logging:
  level:
    root: WARN
    com.Equipo07_SportPulseMS: DEBUG

APISPORTS_KEY: test-key

FIXTURES_SERVICE_URL: http://localhost:8081
STANDINGS_SERVICE_URL: http://localhost:8082
LEAGUES_SERVICE_URL: http://localhost:8083
WEBCLIENT_TIMEOUT: 3000

springdoc:
  api-docs:
    enabled: false

resilience4j:
  circuitbreaker:
    instances:
      dashboardClient:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        minimumNumberOfCalls: 3

  retry:
    instances:
      dashboardClient:
        maxAttempts: 2
        waitDuration: 100ms