version: '3.8'

services:

  ms-gateway:
    build: ./ms-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://ms-auth:8081
      LEAGUES_SERVICE_URL: http://ms-leagues:8082
      TEAMS_SERVICE_URL: http://ms-teams:8083
      FIXTURES_SERVICE_URL: http://ms-fixtures:8085
      STANDINGS_SERVICE_URL: http://ms-standings:8086
      NOTIFICATIONS_SERVICE_URL: http://ms-notifications:8088
      DASHBOARD_SERVICE_URL: http://ms-dashboard:8089

  postgres-auth:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"

  ms-auth:
    build: ./ms-auth
    depends_on:
      - postgres-auth
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      INTERNAL_SECRET: ${INTERNAL_SECRET}

  ms-leagues:
    build: ./ms-leagues
    environment:
      APISPORTS_KEY: ${APISPORTS_KEY}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}

  ms-teams:
    build: ./ms-teams
    environment:
      APISPORTS_KEY: ${APISPORTS_KEY}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}

  ms-fixtures:
    build: ./ms-fixtures
    environment:
      APISPORTS_KEY: ${APISPORTS_KEY}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      TEAMS_SERVICE_URL: http://ms-teams:8083

  ms-standings:
    build: ./ms-standings
    environment:
      APISPORTS_KEY: ${APISPORTS_KEY}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      TEAMS_SERVICE_URL: http://ms-teams:8083

  postgres-notifications:
    image: postgres:15
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"

  ms-notifications:
    build: ./ms-notifications
    depends_on:
      - postgres-notifications
      - ms-fixtures
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notifications:5432/notifications_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      FIXTURES_SERVICE_URL: http://ms-fixtures:8085

  ms-dashboard:
    build: ./ms-dashboard
    depends_on:
      - ms-fixtures
      - ms-standings
      - ms-leagues
    environment:
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      FIXTURES_SERVICE_URL: http://ms-fixtures:8085
      STANDINGS_SERVICE_URL: http://ms-standings:8086
      LEAGUES_SERVICE_URL: http://ms-leagues:8082