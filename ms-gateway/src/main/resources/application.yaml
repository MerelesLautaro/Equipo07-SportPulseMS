server:
  port: 8080

spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      routes:

        # ================= AUTH =================
        - id: auth
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth
                fallbackUri: forward:/fallback/auth

        # ================= LEAGUES =================
        - id: leagues
          uri: ${LEAGUES_SERVICE_URL}
          predicates:
            - Path=/api/leagues/**
          filters:
            - name: CircuitBreaker
              args:
                name: leagues
                fallbackUri: forward:/fallback/leagues

        # ================= TEAMS =================
        - id: teams
          uri: ${TEAMS_SERVICE_URL}
          predicates:
            - Path=/api/teams/**
          filters:
            - name: CircuitBreaker
              args:
                name: teams
                fallbackUri: forward:/fallback/teams

        # ================= FIXTURES =================
        - id: fixtures
          uri: ${FIXTURES_SERVICE_URL}
          predicates:
            - Path=/api/fixtures/**
          filters:
            - name: CircuitBreaker
              args:
                name: fixtures
                fallbackUri: forward:/fallback/fixtures

        # ================= STANDINGS =================
        - id: standings
          uri: ${STANDINGS_SERVICE_URL}
          predicates:
            - Path=/api/standings/**
          filters:
            - name: CircuitBreaker
              args:
                name: standings
                fallbackUri: forward:/fallback/standings

        # ================= NOTIFICATIONS =================
        - id: notifications
          uri: ${NOTIFICATIONS_SERVICE_URL}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notifications
                fallbackUri: forward:/fallback/notifications

        # ================= DASHBOARD =================
        - id: dashboard
          uri: ${DASHBOARD_SERVICE_URL}
          predicates:
            - Path=/api/dashboard/**
          filters:
            - name: CircuitBreaker
              args:
                name: dashboard
                fallbackUri: forward:/fallback/dashboard

services:
  auth: ${AUTH_SERVICE_URL}
  leagues: ${LEAGUES_SERVICE_URL}
  teams: ${TEAMS_SERVICE_URL}
  fixtures: ${FIXTURES_SERVICE_URL}
  standings: ${STANDINGS_SERVICE_URL}
  notifications: ${NOTIFICATIONS_SERVICE_URL}
  dashboard: ${DASHBOARD_SERVICE_URL}

# ================= RESILIENCE4J =================
resilience4j:

  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

    instances:
      auth:
        baseConfig: default
      leagues:
        baseConfig: default
      teams:
        baseConfig: default
      fixtures:
        baseConfig: default
      standings:
        baseConfig: default
      notifications:
        baseConfig: default
      dashboard:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 3s

    instances:
      auth:
        baseConfig: default
      leagues:
        baseConfig: default
      teams:
        baseConfig: default
      fixtures:
        baseConfig: default
      standings:
        baseConfig: default
      notifications:
        baseConfig: default
      dashboard:
        baseConfig: default

# ================= ACTUATOR =================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}